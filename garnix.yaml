# garnix CI — pre-build heavy packages and push them to cache.garnix.io (already a
# trusted substituter on the rpi5, see the nix extra-substituters setting). This lets
# `nixos-rebuild` on the Pi pull the prebuilt binary instead of the ~20-min local
# pnpm/turbo compile of Reactive Resume (and rtk's LTO build).
#
# Only these outputs are built (not the whole flake) to keep CI fast and avoid
# garnix attempting the full aarch64 system / darwin / home configs.
builds:
  include:
    - 'packages.aarch64-linux.reactive-resume'
    - 'packages.aarch64-linux.rtk'
