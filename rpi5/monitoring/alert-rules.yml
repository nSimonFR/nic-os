groups:
  - name: system
    rules:

      # ── Availability ────────────────────────────────────────────────────────
      - alert: InstanceDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target {{ $labels.instance }} is down"

      - alert: ServiceDown
        expr: probe_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is unreachable"

      - alert: ServiceSlowResponse
        expr: probe_duration_seconds > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.instance }} responding slowly ({{ $value | printf \"%.1f\" }}s)"

      # ── Systemd ─────────────────────────────────────────────────────────────
      - alert: SystemdUnitFailed
        expr: node_systemd_unit_state{state="failed"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Systemd unit {{ $labels.name }} is in failed state"

      # ── CPU / Load ──────────────────────────────────────────────────────────
      - alert: HighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}: {{ $value | printf \"%.1f\" }}%"

      - alert: HighLoadAverage
        expr: node_load5 > 4
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 5m load on {{ $labels.instance }}: {{ $value | printf \"%.2f\" }}"

      # ── Memory ──────────────────────────────────────────────────────────────
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.instance }}: {{ $value | printf \"%.1f\" }}%"

      # ── Disk ────────────────────────────────────────────────────────────────
      - alert: DiskAlmostFull
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs|squashfs"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk almost full on {{ $labels.instance }} ({{ $labels.mountpoint }}): {{ $value | printf \"%.1f\" }}%"

      - alert: DiskCritical
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs|squashfs"})) * 100 > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk critically full on {{ $labels.instance }} ({{ $labels.mountpoint }}): {{ $value | printf \"%.1f\" }}%"

      - alert: FilesystemReadOnly
        expr: node_filesystem_readonly{fstype!~"tmpfs|devtmpfs|squashfs|iso9660"} == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Filesystem {{ $labels.mountpoint }} is read-only on {{ $labels.instance }} (possible corruption)"

      # ── RAID ────────────────────────────────────────────────────────────────
      - alert: RAIDDegraded
        expr: node_md_disks_active < node_md_disks
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "RAID array {{ $labels.device }} is degraded: {{ $value }} of {{ printf `node_md_disks{device=\"%s\"}` $labels.device | query | first | value }} disks active"

      # ── Temperature (RPi5) ──────────────────────────────────────────────────
      - alert: HighCpuTemperature
        expr: node_hwmon_temp_celsius{chip=~".*thermal.*",sensor="temp1"} > 75
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RPi5 CPU temperature high: {{ $value | printf \"%.1f\" }}°C"

      - alert: CriticalCpuTemperature
        expr: node_hwmon_temp_celsius{chip=~".*thermal.*",sensor="temp1"} > 85
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "RPi5 CPU temperature critical: {{ $value | printf \"%.1f\" }}°C — throttling imminent"
