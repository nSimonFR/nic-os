################################################################
# Configure the environment
# Add additional environment variables here as needed
################################################################

# override game location
# export WINEPREFIX="$XDG_DATA_HOME"/prefix

# Pin runner to GE-Proton10-30: last version with working DLSS
# GE-Proton 10-31+ breaks DLSS via ntdll-ForceBottomUpAlloc conflicting with libcuda
# See: https://github.com/GloriousEggroll/proton-ge-custom/issues/460
PROTONPATH="$HOME/.var/app/io.github.mactan_sc.RSILauncher/.local/share/Steam/compatibilitytools.d/GE-Proton10-30"

# Nvidia cache options
# Cache path kept outside the Wine prefix so it persists across prefix resets
# and is not confused with RSI Launcher's own per-session GL cache.
# home.nix grants the Flatpak --filesystem access to this path.
__GL_SHADER_DISK_CACHE=1
__GL_SHADER_DISK_CACHE_SIZE=10737418240
__GL_SHADER_DISK_CACHE_PATH="$HOME/.cache/nvidia-shader-cache/star-citizen"
__GL_SHADER_DISK_CACHE_SKIP_CLEANUP=1
__GL_THREADED_OPTIMIZATIONS=1

# Mesa (AMD/Intel) shader cache options
MESA_SHADER_CACHE_DIR="$WINEPREFIX"
MESA_SHADER_CACHE_MAX_SIZE="10G"

# Logs to $HOME/.local/share/umu/steamrt3/var/
# STEAM_LINUX_RUNTIME_LOG=1
# STEAM_LINUX_RUNTIME_VERBOSE=1

# Logs to $HOME
# PROTON_LOG=1

# Optional HUDs
# DXVK_HUD=fps,compiler
MANGOHUD=1

# VKB composite HID fix: VKB devices have composite HID interfaces (joystick + keyboard
# collections on the same hidraw node). winebus.sys fires device-change notifications
# when the keyboard collection becomes active, causing SC to lose the joystick.
# Fix: disable hidraw for all VKB devices → winebus falls back to SDL evdev.
# F-keys still reach SC via the compositor → WM_KEYDOWN path.
# Covers: EVO R (0200), EVO L SEM (0205)
SDL_JOYSTICK_HIDAPI=0
PROTON_DISABLE_HIDRAW=0x231D/0x0200,0x231D/0x0205

# DLSS investigation notes (all disabled — caused crashes):
# - PROTON_FORCE_NVAPI=1: sets DXVK_NVAPI_DRIVER_VERSION=99999 for ALL Wine procs, breaks RSILauncher
# - NVIDIA_WINE_DLL_DIR: enables NGX init but nvngx_dlssg.dll causes ACCESS_VIOLATION (0xC0000005)
# - DXVK_NVAPI_DRS_NGX_DLSS_*_OVERRIDE: requires NVIDIA_WINE_DLL_DIR to actually show DLSS in-game

# Use Wine's Wayland backend instead of X11/Xwayland.
# Fixes: BadWindow (X_UnmapWindow, XID 0x5x00001, serial ~320) fatal crash in RSI
# Launcher.  Wine's X11 driver has a lifecycle race: when Electron's GPU subprocess
# exits, Xwayland destroys its window before the main process can XUnmapWindow it.
# Wayland backend has no XUnmapWindow calls so the race cannot occur.
# SC and the launcher both work correctly under Wine's Wayland backend on Hyprland.
PROTON_ENABLE_WAYLAND=1

# NTSync: GE-Proton10-30 enables WINENTSYNC=1 by default when /dev/ntsync is present
# (kernel module added March 2026). SC deadlocks ~30s into gameplay with NTSync active.
# Disabling forces fallback to esync/fsync which are stable with SC.
PROTON_NO_NTSYNC=1

# HDR
# PROTON_ENABLE_HDR=1

# Pre-launch GPU cache cleanup.
# Chromium/Electron (RSI Launcher UI) caches compiled Dawn WebGPU pipeline blobs
# that embed Wine/DXVK session-specific GPU handles.  On the next launch the GPU
# subprocess tries to restore those stale handles, crashes, and Xwayland destroys
# its X11 window before the main process can UnmapWindow it → BadWindow fatal.
# NVIDIA's GL shader cache (GLCache/802e...) has the same session-coupling issue.
# Deleting these per-process caches before every launch costs ~1 s of extra GPU
# pipeline compilation; not deleting them causes a 100 % reproducible crash.
_pfx="${WINEPREFIX:-$XDG_DATA_HOME/prefix}"
_app="$_pfx/drive_c/users/steamuser/AppData/Roaming/rsilauncher"
rm -rf "$_app/DawnWebGPUCache" "$_app/DawnGraphiteCache" "$_app/GPUCache" \
        "$_pfx/GLCache/802e97e61f113a96fd4d00d1fbd463b0"
unset _pfx _app

# Inject per-process Wine DllOverrides for RSI Launcher.exe into user.reg.
# GE-Proton sets DXVK_ENABLE_NVAPI=1 globally, loading nvapi64.dll into every
# Wine process including Electron.  Electron doesn't use NVAPI and the hook
# interferes with GPU device selection.  SC.exe still gets nvapi64 (for DLSS).
# Condition: only injects if the section is absent (idempotent across launches).
_user_reg="${WINEPREFIX:-$XDG_DATA_HOME/prefix}/user.reg"
if [ -f "$_user_reg" ] && ! grep -qF 'RSI Launcher.exe' "$_user_reg"; then
  _ts=$(date +%s)
  _ht=$(python3 -c "import time; print(f'{(int(time.time())+11644473600)*10000000:x}')")
  printf '\n[Software\\\\Wine\\\\AppDefaults\\\\RSI Launcher.exe\\\\DllOverrides] %s\n#time=%s\n"nvapi64"=""\n"nvofapi64"=""\n\n' \
    "$_ts" "$_ht" >> "$_user_reg"
  unset _ts _ht
fi
unset _user_reg

# Re-inject OpenTrack TrackIR NPClient registry keys (HKLM + HKCU).
# Uses the stable system profile path Z:/run/current-system/sw/libexec/opentrack/
# so the path survives opentrack-sc rebuilds without needing a hash update.
# HKCU (user.reg) is always re-injected to override any stale nix store hash
# that proto-wine may have written there in a previous session (HKCU > HKLM).
_nxpath='Z:/run/current-system/sw/libexec/opentrack/'
_ts=$(date +%s)

# HKLM (system.reg) — inject if stable path absent
_trackir_sysreg="${WINEPREFIX:-$XDG_DATA_HOME/prefix}/system.reg"
if [ -f "$_trackir_sysreg" ] && ! grep -qF "$_nxpath" "$_trackir_sysreg"; then
  printf '\n[Software\\\\NaturalPoint\\\\NATURALPOINT\\\\NPClient Location] %s\n#time=1dcb3d009e0a260\n"Path"="%s"\n\n[Software\\\\Wow6432Node\\\\NaturalPoint\\\\NATURALPOINT\\\\NPClient Location] %s\n#time=1dcb3d009e0a260\n"Path"="%s"\n\n' \
    "$_ts" "$_nxpath" "$_ts" "$_nxpath" >> "$_trackir_sysreg"
fi
unset _trackir_sysreg

# HKCU (user.reg) — always re-inject; overwrites stale store hashes from proto-wine
_trackir_userreg="${WINEPREFIX:-$XDG_DATA_HOME/prefix}/user.reg"
if [ -f "$_trackir_userreg" ]; then
  printf '\n[Software\\\\NaturalPoint\\\\NATURALPOINT\\\\NPClient Location] %s\n#time=1dcb3d009e0a260\n"Path"="%s"\n\n' \
    "$_ts" "$_nxpath" >> "$_trackir_userreg"
fi
unset _trackir_userreg _nxpath _ts

