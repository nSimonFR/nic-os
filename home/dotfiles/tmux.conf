set -g default-terminal "xterm-256color"

bind j select-pane -t :.+
bind k select-pane -t :.-

bind-key C-j resize-pane -D
bind-key C-k resize-pane -U
bind-key C-h resize-pane -L
bind-key C-l resize-pane -R

# Pane borders
set -g pane-border-lines heavy
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour39

# --- Resurrect settings ---
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'vim nvim ssh htop btop top ~claude'

# --- Continuum settings ---
set -g @continuum-save-interval '5'
set -g @continuum-restore 'off'

# Increase scrollback buffer
set -g history-limit 50000

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Load plugins directly (no TPM, avoids NixOS /bin/sh issues)
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux

# Auto-restore on first session (fresh server start only)
set-hook -g session-created 'run-shell -b "[ $(tmux list-sessions | wc -l) -eq 1 ] && bash ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh || true"'
