# NVIDIA Wayland environment variables
env = LIBVA_DRIVER_NAME, nvidia
env = GBM_BACKEND, nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = WLR_NO_HARDWARE_CURSORS, 1
env = __GL_GSYNC_ALLOWED, 1
env = __GL_VRR_ALLOWED, 1
env = NIXOS_OZONE_WL, 1
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# Monitor: LG ultrawide only, vertical Acer disabled.
monitor = desc:LG Electronics 38GN950 008NTKFBE741, 3840x1600@160, 0x0, 1, vrr, 1
monitor = desc:Acer Technologies GN246HL LW3EE0058532, disable
monitor = , preferred, auto, 1

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

general {
    layout = dwindle
    gaps_in = 8
    gaps_out = 16
    border_size = 2
    col.active_border = 0xFFFFFFFF
    col.inactive_border = 0x070707AE
}

decoration {
    rounding = 2
}

dwindle {
    pseudotile = false
}

xwayland {
    force_zero_scaling = true
}

# Bindings
bind = SUPER, Q, killactive
bind = SUPER, Return, exec, kitty
bind = SUPERSHIFT, R, exec, hyprctl reload
bind = SUPERCONTROL, Delete, exec, hyprctl dispatch exit
bind = SUPER, F, fullscreen, 0
bind = SUPER, T, togglefloating
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

bind = SUPERSHIFT, 1, movetoworkspace, 1
bind = SUPERSHIFT, 2, movetoworkspace, 2
bind = SUPERSHIFT, 3, movetoworkspace, 3
bind = SUPERSHIFT, 4, movetoworkspace, 4
bind = SUPERSHIFT, 5, movetoworkspace, 5

bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = CONTROLSHIFT, page_up,   exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = CONTROLSHIFT, page_down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

windowrule = workspace 2, class:^(steam)$
windowrule = workspace 2, class:^(steam_app_default)$

exec-once = sleep 1 && steam
